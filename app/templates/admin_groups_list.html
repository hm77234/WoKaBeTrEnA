{% extends "base.html" %}
{% block content %}
<h1>{{ t.admin_groups_title|default('Gruppen') }}</h1>
<table>
<tr><th>{{ t.group }}</th><th>{{ t.description }}</th><th>{{ t.count }}</th></tr>
{% for group, count in groups %}
<tr>
    <td>{{ group.name }}</td>
    <td>{{ group.description }}</td>
    <td>{{ count }}</td>
</tr>

{% endfor %}
</table>
</table>


<a href="/admin">{{ t.back }}</a>
{% endblock %}
