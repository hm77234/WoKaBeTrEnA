{% extends "base.html" %}
{% block content %}
<h1>{{ icons['words'] }} {{ word.mutter_word }} → Gruppen</h1>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <fieldset>
        <legend>{{ t.assign_groups }}</legend>
        <ul style="list-style:none; padding:0;">
            {% for group in all_groups %}
                <li style="margin-bottom:8px;">
                    <label>
                        <input type="checkbox"
                               name="group_ids"
                               value="{{ group.id }}"
                               {% if group in word.training_groups %}checked{% endif %}>
                        {{ icons.groups }} {{ group.name }}
                    </label>
                </li>
                

            {% endfor %}
        </ul>
    </fieldset>

    <div style="margin-top:20px;">
        <button type="submit">{{ icons['save'] }} {{ t.save }}</button>
        <a href="{{ url_for('admin_words', pair_name=word.language_pair.name) }}"
           style="margin-left:10px;">
            {{ icons['cancel'] }} {{ t.cancel or 'Abbrechen' }}
        </a>
    </div>
</form>
{% endblock %}
